<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram</title>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="styles.css">
</head>

<body>

<section class="posts">

<div class="container">

  <div class="left">
    <img src="https://mxp-media.ilnmedia.com/media/content/2020/Jun/Virat-Kohli-Slide-1_5ef9562dcbd4a.jpeg?w=720&h=1280&cc=1">
  </div>

  <div class="right">

    <div class="header">
      <img src="https://documents.iplt20.com/ipl/IPLHeadshot2025/2.png">

      <div class="username">
        virat.kohli <span class="verified">✔</span>
      </div>

      <div class="menu">⋮</div>
    </div>

    <div class="comments">
      <div class="comment"><b>virat.kohli:</b> 🏏</div>
      <div class="comment"><b>husain:</b> 😍🦁</div>
      <div class="comment"><b>pavan.__.dolly:</b> ✨🔱</div>
    </div>

    <div class="footer">

      <div class="actions">
        <i class="fa-regular fa-heart"></i>
        <i class="fa-regular fa-comment"></i>
        <i class="fa-regular fa-paper-plane"></i>
        <i class="fa-regular fa-bookmark"></i>
      </div>

      <div class="stats">5.2M likes · 100K comments</div>
      <div class="date">January 10</div>
      <div class="time">5:30 PM</div>

      <div class="input-box">
        <input type="text" placeholder="Add a comment...">
        <button>Post</button>
      </div>

    </div>

  </div>
</div>

</section>

</body>
</html>
