<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tom & Jerry Ending</title>
<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
}

.scene{
    position:relative;
    width:100vw;
    height:100vh;
}

.tom{
    position:absolute;
    bottom:100px;
    left:-200px;
    width:200px;
    animation: tomRun 5s linear forwards;
}

.jerry{
    position:absolute;
    bottom:100px;
    right:-150px;
    width:120px;
    animation: jerryRun 5s linear forwards;
}

.endText{
    position:absolute;
    top:40%;
    width:100%;
    text-align:center;
    font-size:100px;
    font-family:Arial, sans-serif;
    color:yellow;
    opacity:0;
    animation: endShow 1s forwards;
    animation-delay:5s;
}

@keyframes tomRun{
    0%{ left:-200px; transform:scaleX(1); }
    80%{ left:50%; transform:scaleX(1); }
    100%{ left:50%; transform:scaleX(-1); }
}

@keyframes jerryRun{
    0%{ right:-150px; }
    80%{ right:50%; }
    100%{ right:50%; }
}

@keyframes endShow{
    from{ opacity:0; transform:scale(0); }
    to{ opacity:1; transform:scale(1.5); }
}
</style>
</head>

<body>

<div class="scene">
<img src="https://i.pinimg.com/736x/46/d7/bd/46d7bd213e7dea6ece2524da2f859d96.jpg" class="tom">
<img src="https://wallpapercave.com/wp/wp14084339.jpg" class="jerry">
<div class="endText">The End😂</div>
</div>

</body>
</html>
